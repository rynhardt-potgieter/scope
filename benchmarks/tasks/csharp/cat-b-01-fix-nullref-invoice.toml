[task]
id = "cs-cat-b-01"
category = "bug-fix"
language = "csharp"
corpus = "fixture"
description = "Fix InvoiceService.SettleInvoice data integrity bug where failed payments reduce invoice balance"

[prompt]
text = """
Users report invoices showing as partially paid even when the payment was \
declined. The invoice balance is reduced but no actual payment was collected. \
Investigate InvoiceService.SettleInvoice and fix the data integrity issue. \
Make sure the project still compiles.
"""

[target]
symbol = "InvoiceService.SettleInvoice"
file = "src/Infrastructure/Services/InvoiceService.cs"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope trace", "scope sketch"]
