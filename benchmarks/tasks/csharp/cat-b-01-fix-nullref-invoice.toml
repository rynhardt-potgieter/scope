[task]
id = "cs-cat-b-01"
category = "bug-fix"
language = "csharp"
corpus = "fixture"
description = "Fix InvoiceService.SettleInvoice NullReferenceException when payment method missing"

[prompt]
text = """
Users report a NullReferenceException when settling invoices with expired or \
invalid payment methods. The error occurs in InvoiceService.SettleInvoice but \
the stack trace is unclear. Investigate the invoice settlement flow, find where \
the null reference occurs, and add proper null checking. The fix should handle \
the case where PaymentMethod is null gracefully without crashing. Make sure the \
project still compiles.
"""

[target]
symbol = "InvoiceService.SettleInvoice"
file = "src/Infrastructure/Services/InvoiceService.cs"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope trace", "scope sketch"]
