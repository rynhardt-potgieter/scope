[task]
id = "cs-cat-b-02"
category = "cross-cutting"
language = "csharp"
corpus = "fixture"
description = "Add input validation to all controller action methods"

[prompt]
text = """
Add input validation to all public action methods in OrderController, \
RefundController, and SubscriptionController. Each method should validate \
its parameters at the top of the method body: check for null/empty strings, \
negative amounts, and invalid card details. Throw ArgumentException with \
a descriptive message for invalid inputs. Make sure the project still compiles.
"""

[target]
symbol = "OrderController"
file = "src/Controllers/OrderController.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope sketch", "scope deps"]
