[task]
id = "cs-cat-b-01"
category = "cross-cutting"
language = "csharp"
corpus = "fixture"
description = "Add ILogger structured logging to all PaymentService public methods"

[prompt]
text = """
Add structured logging to all public methods in PaymentService using \
Console.WriteLine as a stand-in for ILogger<PaymentService>. Each method \
should log its entry with parameters and its exit with the result status. \
Use a consistent format: "[PaymentService.MethodName] message". \
Log to Console.Error (stderr) so it doesn't pollute stdout. \
Make sure the project still compiles.
"""

[target]
symbol = "PaymentService"
file = "src/Payments/PaymentService.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope sketch"]
