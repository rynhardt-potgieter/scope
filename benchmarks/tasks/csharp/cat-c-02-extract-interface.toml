[task]
id = "cs-cat-c-02"
category = "dependency-understanding"
language = "csharp"
corpus = "fixture"
description = "Extract IUserService interface from UserService"

[prompt]
text = """
Extract an IUserService interface from the UserService class. The interface \
should declare all public methods: GetUser, CreateUser, and UserExists. \
Create the interface in a new file src/Users/IUserService.cs. Update all \
consumers of UserService (controllers, other services) to depend on \
IUserService instead of the concrete UserService. Make sure the project \
still compiles.
"""

[target]
symbol = "UserService"
file = "src/Users/UserService.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["sc refs", "sc sketch", "sc deps"]
