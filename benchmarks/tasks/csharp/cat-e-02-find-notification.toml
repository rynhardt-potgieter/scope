[task]
id = "cs-cat-e-02"
category = "discovery"
language = "csharp"
corpus = "fixture"
description = "Find notification handling and add a push notification channel"

[prompt]
text = """
Find where notifications are handled in this codebase and add a new push \
notification channel. Add a SendPushNotification method to the \
INotificationService interface and implement it in NotificationService. \
The method should accept a userId and a message. Update at least one \
existing notification caller to also send a push notification. Make sure \
the project still compiles.
"""

[target]
symbol = "NotificationService"
file = "src/Notifications/NotificationService.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope find", "scope refs"]
