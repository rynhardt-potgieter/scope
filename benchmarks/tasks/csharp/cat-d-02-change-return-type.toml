[task]
id = "cs-cat-d-02"
category = "impact-aware"
language = "csharp"
corpus = "fixture"
description = "Change ProcessPayment return type to use Result pattern with PaymentError"

[prompt]
text = """
Change the return type of ProcessPayment in PaymentService from PaymentResult \
to a tuple (PaymentResult? Result, PaymentError? Error) so callers can \
distinguish between success and failure without exceptions. The PaymentError \
class already exists in PaymentResult.cs. Update the IPaymentService interface \
and all callers to handle both the success and error cases. On success, \
Error should be null. On failure, Result should be null and Error should \
contain the details. Make sure the project still compiles.
"""

[target]
symbol = "PaymentService.ProcessPayment"
file = "src/Payments/PaymentService.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = true
caller_coverage_threshold = 1.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope refs", "scope impact", "scope sketch"]
