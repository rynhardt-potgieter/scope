[task]
id = "cs-cat-e-01"
category = "discovery"
language = "csharp"
corpus = "fixture"
description = "Find payment retry logic and add exponential backoff"

[prompt]
text = """
Find where payment retry logic is handled in this codebase and add an \
exponential backoff strategy. The backoff should start at 100ms and double \
with each attempt, with a maximum of 3 retries. Add a Thread.Sleep delay \
between retry attempts. Make sure the project still compiles.
"""

[target]
symbol = "PaymentRetryWorker.Run"
file = "src/Workers/PaymentRetryWorker.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope find"]
