[task]
id = "cs-cat-c-01"
category = "dependency-understanding"
language = "csharp"
corpus = "fixture"
description = "Replace PaymentProcessor with a new IPaymentGateway interface"

[prompt]
text = """
Replace the concrete PaymentProcessor dependency in PaymentService with a \
new IPaymentGateway interface. Create the IPaymentGateway interface with \
the same Charge and Refund method signatures as PaymentProcessor. Make \
PaymentProcessor implement IPaymentGateway. Update PaymentService to depend \
on IPaymentGateway instead of the concrete class. Update all constructor \
calls and DI registrations. Make sure the project still compiles.
"""

[target]
symbol = "PaymentService"
file = "src/Payments/PaymentService.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope deps", "scope sketch", "scope refs"]
