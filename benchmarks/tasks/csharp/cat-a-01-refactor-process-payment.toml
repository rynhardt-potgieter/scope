[task]
id = "cs-cat-a-01"
category = "signature-refactoring"
language = "csharp"
corpus = "fixture"
description = "Refactor ProcessPayment to accept a PaymentRequest record"

[prompt]
text = """
Refactor the ProcessPayment method in PaymentService to accept a single \
PaymentRequest record instead of individual amount, userId, and card parameters. \
The PaymentRequest record already exists in PaymentRequest.cs. \
Update all callers throughout the codebase. Make sure the project still compiles.
"""

[target]
symbol = "PaymentService.ProcessPayment"
file = "src/Payments/PaymentService.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = true
caller_coverage_threshold = 1.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope refs", "scope sketch", "scope impact"]
