[task]
id = "cs-cat-d-01"
category = "impact-aware"
language = "csharp"
corpus = "fixture"
description = "Make UserRepository.FindById async and update all callers with await"

[prompt]
text = """
Make the FindById method in UserRepository async. Change its return type \
from User? to Task<User?>. Update the IUserRepository interface to match. \
Update all callers to await the result — this will cascade through \
UserService and into any controllers that call UserService. Make all \
affected methods async as needed. Make sure the project still compiles.
"""

[target]
symbol = "UserRepository.FindById"
file = "src/Users/UserRepository.cs"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = true
caller_coverage_threshold = 1.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["sc refs", "sc impact", "sc sketch"]
