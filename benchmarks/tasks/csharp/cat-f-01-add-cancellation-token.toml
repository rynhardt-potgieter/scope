[task]
id = "cs-cat-f-01"
category = "cross-cutting"
language = "csharp"
corpus = "fixture"
description = "Add CancellationToken to IPaymentService and IUserService methods"

[prompt]
text = """
Add a CancellationToken parameter to all methods in the IPaymentService \
and IUserService interfaces that don't already have one. Update all \
implementations (PaymentService, UserService) and all callers to pass \
the token through. Use CancellationToken.None at the top-level call \
sites (controllers, workers) if no token is available. Make sure the \
project still compiles.
"""

[target]
symbol = "IPaymentService"
file = "src/Application/Interfaces/IPaymentService.cs"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = true
caller_coverage_threshold = 0.8
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope callers", "scope sketch"]
