[task]
id = "cs-cat-a-01"
category = "discovery"
language = "csharp"
corpus = "fixture"
description = "Find where notifications are permanently abandoned and add dead letter pattern"

[prompt]
text = """
Find where notifications are permanently abandoned after all delivery attempts \
fail. They should be moved to a dead letter state instead of being silently \
filtered out. Add a DeadLettered status, set it when max attempts are reached, \
and log a structured error with the notification details. Make sure the project \
still compiles.
"""

[target]
symbol = "NotificationDeliveryWorker.ExecuteAsync"
file = "src/Infrastructure/Workers/NotificationDeliveryWorker.cs"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope find"]
