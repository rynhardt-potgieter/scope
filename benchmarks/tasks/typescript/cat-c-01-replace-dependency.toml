[task]
id = "ts-cat-c-01"
category = "dependency-understanding"
language = "typescript"
corpus = "fixture"
description = "Replace PaymentProcessor with a new PaymentGateway"

[prompt]
text = """
Replace the PaymentProcessor class with a new PaymentGateway class. \
The PaymentGateway should have the same interface (charge and refund methods) \
but be in a new file src/payments/gateway.ts. Update PaymentService to use \
PaymentGateway instead of PaymentProcessor. Remove the old processor.ts file. \
Update all imports. Make sure all tests still pass.
"""

[target]
symbol = "PaymentProcessor"
file = "src/payments/processor.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope deps", "scope rdeps", "scope sketch"]
