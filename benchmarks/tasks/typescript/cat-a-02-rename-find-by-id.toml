[task]
id = "ts-cat-a-02"
category = "signature-refactoring"
language = "typescript"
corpus = "fixture"
description = "Rename UserRepository.findById to getUserById"

[prompt]
text = """
Rename the findById method in UserRepository to getUserById. \
Update all callers throughout the codebase to use the new name. \
Make sure all tests still pass.
"""

[target]
symbol = "UserRepository.findById"
file = "src/users/repository.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = true
caller_coverage_threshold = 1.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["sc refs", "sc sketch"]
