[task]
id = "ts-cat-b-01"
category = "cross-cutting"
language = "typescript"
corpus = "fixture"
description = "Add structured logging to all PaymentService public methods"

[prompt]
text = """
Add structured logging to all public methods in PaymentService. \
At the start of each method, log the method name and its parameters. \
At the end of each method, log the result or any error that occurred. \
Use console.log with a JSON object format like: \
console.log(JSON.stringify({ method: "methodName", action: "enter"/"exit", ... })). \
Make sure all tests still pass.
"""

[target]
symbol = "PaymentService"
file = "src/payments/service.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["sc sketch", "sc refs"]
