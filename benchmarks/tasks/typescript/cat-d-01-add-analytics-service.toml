[task]
id = "ts-cat-d-01"
category = "new-feature"
language = "typescript"
corpus = "fixture"
description = "Add PaymentAnalyticsService integrating PaymentService, UserService, and Cache"

[prompt]
text = """
Create a new PaymentAnalyticsService class in src/payments/services/ that \
provides payment analytics by integrating data from PaymentService, UserService, \
and CacheService. The service should have these methods: \
1. getPaymentSummary(userId) — returns total payments, success rate, average amount \
2. getTopPayingUsers(limit) — returns users ranked by total payment volume \
3. getFailureAnalysis() — returns breakdown of payment failures by reason \
All methods should use CacheService for caching results with a 5-minute TTL. \
Use scope sketch on each dependency to understand their APIs before coding. \
Make sure the project still compiles.
"""

[target]
symbol = "PaymentAnalyticsService"
file = "src/payments/services/PaymentAnalyticsService.ts"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope sketch"]
