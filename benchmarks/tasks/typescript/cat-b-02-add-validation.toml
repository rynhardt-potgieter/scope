[task]
id = "ts-cat-b-02"
category = "cross-cutting"
language = "typescript"
corpus = "fixture"
description = "Add input validation to all controller methods"

[prompt]
text = """
Add input validation to all public methods in OrderController, RefundController, \
and SubscriptionService. Each method should validate that required string parameters \
are non-empty and that numeric amounts are positive. Throw an Error with a \
descriptive message if validation fails. Make sure all tests still pass.
"""

[target]
symbol = "OrderController"
file = "src/controllers/order.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope sketch", "scope deps"]
