[task]
id = "ts-cat-c-01"
category = "refactoring"
language = "typescript"
corpus = "fixture"
description = "Refactor NotificationService to use strategy pattern for channel selection"

[prompt]
text = """
Refactor the NotificationService to use the strategy pattern for channel \
selection instead of the switch statement in the private deliver() method. \
Create a NotificationStrategy interface with a send() method, and implement \
EmailStrategy, PushStrategy, and SmsStrategy classes. The NotificationService \
should accept a Map of channel-to-strategy in its constructor and delegate \
delivery to the appropriate strategy. Make sure the project still compiles.
"""

[target]
symbol = "NotificationService"
file = "src/notifications/services/NotificationService.ts"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope sketch", "scope refs"]
