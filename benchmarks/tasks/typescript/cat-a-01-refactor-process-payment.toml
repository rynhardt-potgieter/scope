[task]
id = "ts-cat-a-01"
category = "signature-refactoring"
language = "typescript"
corpus = "fixture"
description = "Refactor processPayment to accept PaymentRequest object"

[prompt]
text = """
Refactor the processPayment method in PaymentService to accept a single \
PaymentRequest object instead of individual amount, userId, and card parameters. \
Update all callers throughout the codebase. Make sure all tests still pass.
"""

[target]
symbol = "PaymentService.processPayment"
file = "src/payments/service.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = true
caller_coverage_threshold = 1.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["sc refs", "sc sketch", "sc impact"]
