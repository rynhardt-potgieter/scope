[task]
id = "ts-cat-e-02"
category = "discovery"
language = "typescript"
corpus = "fixture"
description = "Find notification handling and add a new push notification channel"

[prompt]
text = """
Find where notification handling is implemented in this codebase. \
Add a new sendPushNotification method to the notification service that \
accepts a userId, title, and body. Follow the same pattern as the existing \
sendEmail and sendSms methods. Make sure all tests still pass.
"""

[target]
symbol = "NotificationService"
file = "src/notifications/service.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope find", "scope sketch"]
