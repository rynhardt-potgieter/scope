[task]
id = "ts-cat-e-01"
category = "exploration"
language = "typescript"
corpus = "fixture"
description = "Trace complete payment flow from OrderController.checkout to notification delivery"

[prompt]
text = """
Trace the complete payment processing flow in this codebase, starting from \
OrderController.checkout all the way through to notification delivery. \
Document the flow in a new file docs/payment-flow.md with: \
1. Each step in the flow (controller → service → processor → notification) \
2. The exact method signatures at each step \
3. Error handling at each layer \
4. Which services are involved and how they connect \
Use scope commands to understand the architecture without reading every file.
"""

[target]
symbol = "OrderController.checkout"
file = "docs/payment-flow.md"

[correctness]
require_compilation = false
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope sketch", "scope deps"]
