[task]
id = "ts-cat-f-01"
category = "cross-cutting"
language = "typescript"
corpus = "fixture"
description = "Add structured error logging to all catch blocks in payment services"

[prompt]
text = """
Add structured error logging to all catch blocks in payment-related \
service files (any file under src/payments/). Each catch block should \
log a structured object with: { service: className, method: methodName, \
error: error.message, timestamp: new Date().toISOString() } using the \
existing Logger class. Do not modify catch blocks that already have \
structured logging. Make sure the project still compiles.
"""

[target]
symbol = "PaymentService"
file = "src/payments/services/PaymentService.ts"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope find", "scope callers"]
