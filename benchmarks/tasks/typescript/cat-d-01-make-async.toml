[task]
id = "ts-cat-d-01"
category = "impact-aware"
language = "typescript"
corpus = "fixture"
description = "Make UserRepository.findById async, update all callers"

[prompt]
text = """
Make the UserRepository.findById method async (return Promise<User | undefined>). \
Update all callers to properly await the result. This includes UserService.getUser \
and any other code that calls findById. Make sure all tests still pass.
"""

[target]
symbol = "UserRepository.findById"
file = "src/users/repository.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = true
caller_coverage_threshold = 1.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope refs", "scope impact", "scope sketch"]
