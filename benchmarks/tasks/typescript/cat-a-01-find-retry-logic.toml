[task]
id = "ts-cat-a-01"
category = "discovery"
language = "typescript"
corpus = "fixture"
description = "Find payment retry logic and add exponential backoff with jitter"

[prompt]
text = """
Find where payment retry logic is implemented in this codebase. Once found, \
modify the retry mechanism to use exponential backoff with jitter. The backoff \
should start at 200ms and double with each attempt, with random jitter of up to \
50% of the delay. Cap the maximum delay at 5 seconds. Add a short comment \
explaining the backoff formula. Make sure the project still compiles.
"""

[target]
symbol = "PaymentRetryWorker.retryFailedPayment"
file = "src/workers/jobs/PaymentRetryWorker.ts"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope find"]
