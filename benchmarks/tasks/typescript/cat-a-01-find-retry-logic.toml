[task]
id = "ts-cat-a-01"
category = "discovery"
language = "typescript"
corpus = "fixture"
description = "Find payment charge decline handling and add configurable retry delay"

[prompt]
text = """
Find the code that handles payment charge failures after the processor returns \
a decline. The decline handling should add a configurable retry delay before \
requeueing. Add a constant for the default delay (3000ms) and make the delay \
configurable via a parameter. Add a short comment explaining the retry delay. \
Make sure the project still compiles.
"""

[target]
symbol = "PaymentRetryWorker.retryFailedPayment"
file = "src/workers/jobs/PaymentRetryWorker.ts"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope find"]
