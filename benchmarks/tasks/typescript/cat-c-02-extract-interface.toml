[task]
id = "ts-cat-c-02"
category = "dependency-understanding"
language = "typescript"
corpus = "fixture"
description = "Extract IUserRepository interface from UserRepository"

[prompt]
text = """
Extract an IUserRepository interface from the UserRepository class. \
The interface should declare all three public methods (findById, findByEmail, create). \
Put the interface in a new file src/users/interfaces.ts. \
Make UserRepository implement IUserRepository explicitly. \
Update UserService to depend on IUserRepository instead of UserRepository. \
Make sure all tests still pass.
"""

[target]
symbol = "UserRepository"
file = "src/users/repository.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["sc sketch", "sc deps", "sc rdeps"]
