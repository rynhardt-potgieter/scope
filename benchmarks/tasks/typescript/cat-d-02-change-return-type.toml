[task]
id = "ts-cat-d-02"
category = "impact-aware"
language = "typescript"
corpus = "fixture"
description = "Change processPayment return type to include error handling"

[prompt]
text = """
Change the processPayment method in PaymentService to return \
{ success: boolean; result?: PaymentResult; error?: string } instead of \
returning PaymentResult directly. The method should catch errors from \
the processor and return them in the error field instead of throwing. \
Update all callers to handle the new return type. \
Make sure all tests still pass.
"""

[target]
symbol = "PaymentService.processPayment"
file = "src/payments/service.ts"

[correctness]
require_compilation = true
require_tests_pass = true
require_caller_coverage = true
caller_coverage_threshold = 1.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["sc refs", "sc impact", "sc sketch"]
