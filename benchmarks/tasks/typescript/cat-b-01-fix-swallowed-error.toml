[task]
id = "ts-cat-b-01"
category = "bug-fix"
language = "typescript"
corpus = "fixture"
description = "Fix SubscriptionService.processRenewal silently swallowing payment errors"

[prompt]
text = """
Users report that subscription renewals sometimes show as successful even when \
payment processing fails with an error. Investigate the subscription renewal \
flow and find where payment errors might be silently swallowed instead of being \
properly propagated. Fix the bug so that payment processing errors are correctly \
reported to the caller. Make sure the project still compiles.
"""

[target]
symbol = "SubscriptionService.processRenewal"
file = "src/payments/services/SubscriptionService.ts"

[correctness]
require_compilation = true
require_tests_pass = false
require_caller_coverage = false
caller_coverage_threshold = 0.0
pattern_match_threshold = 0.0

[scope]
expected_commands = ["scope trace", "scope sketch"]
